{% extends "base.html" %}

{% block title %}流量监控 - 防火墙面板{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="bi bi-graph-up"></i> 流量监控</h1>
    <button class="btn btn-sm btn-outline-primary" onclick="loadTraffic()">
        <i class="bi bi-arrow-clockwise"></i> 刷新
    </button>
</div>

<div class="card">
    <div class="card-header">
        <span><i class="bi bi-ethernet"></i> 网卡流量</span>
    </div>
    <div class="card-body" id="trafficContent">
        <p class="text-center text-muted py-4">加载中...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
    }

    function loadTraffic() {
        fetch('/api/traffic')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('trafficContent');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="bi bi-ethernet"></i><p>未检测到网卡</p></div>';
                    return;
                }
                let html = '<div class="row">';
                data.forEach(iface => {
                    html += `
                    <div class="col-md-6 mb-3">
                        <div class="card border">
                            <div class="card-header bg-light">
                                <i class="bi bi-ethernet"></i> <strong>${iface.interface}</strong>
                            </div>
                            <div class="card-body">
                                <table class="table table-sm table-borderless mb-0">
                                    <tr><td class="text-muted">接收流量</td><td class="text-end text-success fw-bold">${formatBytes(iface.rx_bytes)}</td></tr>
                                    <tr><td class="text-muted">接收包数</td><td class="text-end">${iface.rx_packets.toLocaleString()}</td></tr>
                                    <tr><td class="text-muted">接收错误/丢包</td><td class="text-end text-danger">${iface.rx_errors} / ${iface.rx_drops}</td></tr>
                                    <tr><td colspan="2"><hr class="my-1"></td></tr>
                                    <tr><td class="text-muted">发送流量</td><td class="text-end text-primary fw-bold">${formatBytes(iface.tx_bytes)}</td></tr>
                                    <tr><td class="text-muted">发送包数</td><td class="text-end">${iface.tx_packets.toLocaleString()}</td></tr>
                                    <tr><td class="text-muted">发送错误/丢包</td><td class="text-end text-danger">${iface.tx_errors} / ${iface.tx_drops}</td></tr>
                                </table>
                            </div>
                        </div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('trafficContent').innerHTML =
                    `<p class="text-center text-danger py-4">加载失败: ${err}</p>`;
            });
    }
    loadTraffic();
</script>
{% endblock %}
