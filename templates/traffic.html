<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量监控 - 防火墙面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">防火墙面板</a>
            <div class="navbar-nav ms-auto">
                <a class="btn btn-outline-light btn-sm me-1" href="/blacklist"><i class="bi bi-shield-lock"></i> 黑白名单</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/connections"><i class="bi bi-activity"></i> 连接</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/traffic"><i class="bi bi-graph-up"></i> 流量</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/geoip"><i class="bi bi-globe2"></i> 地区封锁</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/conflicts"><i class="bi bi-exclamation-triangle"></i> 冲突检测</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/expiry"><i class="bi bi-clock"></i> 规则过期</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/health"><i class="bi bi-heart-pulse"></i> 健康检查</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/logs"><i class="bi bi-journal-text"></i> 日志</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-graph-up"></i> 网卡流量监控</span>
                <button class="btn btn-sm btn-outline-primary" onclick="loadTraffic()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
            <div class="card-body" id="trafficContent">
                <p class="text-center text-muted">加载中...</p>
            </div>
        </div>
        <a href="/" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回规则管理</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function loadTraffic() {
            fetch('/api/traffic')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('trafficContent');
                    if (data.length === 0) {
                        container.innerHTML = '<p class="text-center text-muted">未检测到网卡</p>';
                        return;
                    }
                    let html = '<div class="row">';
                    data.forEach(iface => {
                        html += `
                        <div class="col-md-6 mb-3">
                            <div class="card border">
                                <div class="card-header bg-light">
                                    <i class="bi bi-ethernet"></i> <strong>${iface.interface}</strong>
                                </div>
                                <div class="card-body">
                                    <table class="table table-sm table-borderless mb-0">
                                        <tr>
                                            <td class="text-muted">接收流量</td>
                                            <td class="text-end text-success fw-bold">${formatBytes(iface.rx_bytes)}</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">接收包数</td>
                                            <td class="text-end">${iface.rx_packets.toLocaleString()}</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">接收错误/丢包</td>
                                            <td class="text-end text-danger">${iface.rx_errors} / ${iface.rx_drops}</td>
                                        </tr>
                                        <tr><td colspan="2"><hr class="my-1"></td></tr>
                                        <tr>
                                            <td class="text-muted">发送流量</td>
                                            <td class="text-end text-primary fw-bold">${formatBytes(iface.tx_bytes)}</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">发送包数</td>
                                            <td class="text-end">${iface.tx_packets.toLocaleString()}</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">发送错误/丢包</td>
                                            <td class="text-end text-danger">${iface.tx_errors} / ${iface.tx_drops}</td>
                                        </tr>
                                    </table>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('trafficContent').innerHTML =
                        `<p class="text-center text-danger">加载失败: ${err}</p>`;
                });
        }

        loadTraffic();
    </script>
</body>
</html>
