<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时连接 - 防火墙面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">防火墙面板</a>
            <div class="navbar-nav ms-auto">
                <a class="btn btn-outline-light btn-sm me-1" href="/blacklist"><i class="bi bi-shield-lock"></i> 黑白名单</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/connections"><i class="bi bi-activity"></i> 连接</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/traffic"><i class="bi bi-graph-up"></i> 流量</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/geoip"><i class="bi bi-globe2"></i> 地区封锁</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/conflicts"><i class="bi bi-exclamation-triangle"></i> 冲突检测</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/expiry"><i class="bi bi-clock"></i> 规则过期</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/health"><i class="bi bi-heart-pulse"></i> 健康检查</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/logs"><i class="bi bi-journal-text"></i> 日志</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-activity"></i> 实时 TCP 连接</span>
                <div>
                    <select id="stateFilter" class="form-select form-select-sm d-inline-block" style="width:auto;" onchange="loadConnections()">
                        <option value="">所有状态</option>
                        <option value="ESTABLISHED">ESTABLISHED</option>
                        <option value="LISTEN">LISTEN</option>
                        <option value="TIME_WAIT">TIME_WAIT</option>
                        <option value="CLOSE_WAIT">CLOSE_WAIT</option>
                        <option value="SYN_SENT">SYN_SENT</option>
                        <option value="SYN_RECV">SYN_RECV</option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary ms-2" onclick="loadConnections()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                    <button id="autoRefreshBtn" class="btn btn-sm btn-outline-success ms-1" onclick="toggleAutoRefresh()">
                        <i class="bi bi-play"></i> 自动刷新
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="mb-2">
                    <span class="badge bg-secondary" id="totalCount">加载中...</span>
                    <span class="badge bg-success ms-1" id="establishedCount"></span>
                    <span class="badge bg-info ms-1" id="listenCount"></span>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-striped table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>协议</th>
                                <th>本地地址</th>
                                <th>远程地址</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="connTable">
                            <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <a href="/" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> 返回规则管理</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let autoRefreshTimer = null;

        function stateBadge(state) {
            const colors = {
                'ESTABLISHED': 'bg-success', 'LISTEN': 'bg-info',
                'TIME_WAIT': 'bg-secondary', 'CLOSE_WAIT': 'bg-warning',
                'SYN_SENT': 'bg-primary', 'SYN_RECV': 'bg-primary',
                'FIN_WAIT1': 'bg-dark', 'FIN_WAIT2': 'bg-dark',
            };
            return `<span class="badge ${colors[state] || 'bg-secondary'}">${state}</span>`;
        }

        function loadConnections() {
            const filter = document.getElementById('stateFilter').value;
            const url = filter ? `/api/connections?state=${filter}` : '/api/connections';
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('connTable');
                    document.getElementById('totalCount').textContent = `共 ${data.length} 条连接`;

                    const established = data.filter(c => c.state === 'ESTABLISHED').length;
                    const listening = data.filter(c => c.state === 'LISTEN').length;
                    document.getElementById('establishedCount').textContent = `ESTABLISHED: ${established}`;
                    document.getElementById('listenCount').textContent = `LISTEN: ${listening}`;

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">无连接</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.map((c, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${c.protocol}</td>
                            <td><code>${c.local}</code></td>
                            <td><code>${c.remote}</code></td>
                            <td>${stateBadge(c.state)}</td>
                        </tr>
                    `).join('');
                })
                .catch(err => {
                    document.getElementById('connTable').innerHTML =
                        `<tr><td colspan="5" class="text-center text-danger">加载失败: ${err}</td></tr>`;
                });
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('autoRefreshBtn');
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
                btn.innerHTML = '<i class="bi bi-play"></i> 自动刷新';
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-outline-success');
            } else {
                loadConnections();
                autoRefreshTimer = setInterval(loadConnections, 3000);
                btn.innerHTML = '<i class="bi bi-stop"></i> 停止刷新';
                btn.classList.remove('btn-outline-success');
                btn.classList.add('btn-danger');
            }
        }

        loadConnections();
    </script>
</body>
</html>
