{% extends "base.html" %}

{% block title %}操作日志 - 防火墙面板{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="bi bi-journal-text"></i> 操作日志</h1>
    <div class="toolbar">
        <a href="/logs?lines=50" class="btn btn-sm {% if lines == 50 %}btn-primary{% else %}btn-outline-secondary{% endif %}">50条</a>
        <a href="/logs?lines=100" class="btn btn-sm {% if lines == 100 %}btn-primary{% else %}btn-outline-secondary{% endif %}">100条</a>
        <a href="/logs?lines=200" class="btn btn-sm {% if lines == 200 %}btn-primary{% else %}btn-outline-secondary{% endif %}">200条</a>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        {% if log_lines %}
        <pre class="log-output">{% for line in log_lines %}{{ line }}{% endfor %}</pre>
        {% else %}
        <div class="empty-state">
            <i class="bi bi-journal-text"></i>
            <p>暂无日志记录</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const logOutput = document.querySelector('.log-output');
    if (logOutput) logOutput.scrollTop = logOutput.scrollHeight;
</script>
{% endblock %}
