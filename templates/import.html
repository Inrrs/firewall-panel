<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入规则 - 防火墙面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">防火墙面板</a>
            <div class="navbar-nav ms-auto">
                <a class="btn btn-outline-light btn-sm me-1" href="/blacklist"><i class="bi bi-shield-lock"></i> 黑白名单</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/connections"><i class="bi bi-activity"></i> 连接</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/traffic"><i class="bi bi-graph-up"></i> 流量</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/geoip"><i class="bi bi-globe2"></i> 地区封锁</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/conflicts"><i class="bi bi-exclamation-triangle"></i> 冲突检测</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/expiry"><i class="bi bi-clock"></i> 规则过期</a>
                <a class="btn btn-outline-light btn-sm me-1" href="/health"><i class="bi bi-heart-pulse"></i> 健康检查</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/logs"><i class="bi bi-journal-text"></i> 日志</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-upload"></i> 导入规则
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST" action="/import" enctype="multipart/form-data">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label class="form-label">选择JSON文件</label>
                                <input type="file" name="file" class="form-control" accept=".json" required>
                                <div class="form-text">请选择之前导出的规则JSON文件</div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" name="clear_first" id="clear_first"
                                       onchange="if(this.checked) confirm('确定要先清除所有现有规则吗？') || (this.checked=false);">
                                <label class="form-check-label" for="clear_first">导入前清除所有现有规则</label>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-upload"></i> 导入
                            </button>
                            <a href="/" class="btn btn-secondary ms-2">取消</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
