{% extends "base.html" %}

{% block title %}导入规则 - 防火墙面板{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="bi bi-upload"></i> 导入规则</h1>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <span><i class="bi bi-upload"></i> 选择文件</span>
            </div>
            <div class="card-body">
                <form method="POST" action="/import" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">选择 JSON 文件</label>
                        <input type="file" name="file" class="form-control" accept=".json" required>
                        <div class="form-text">请选择之前导出的规则 JSON 文件</div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="clear_first" id="clear_first"
                               onchange="if(this.checked) confirm('确定要先清除所有现有规则吗？') || (this.checked=false);">
                        <label class="form-check-label" for="clear_first">导入前清除所有现有规则</label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-upload"></i> 导入
                    </button>
                    <a href="/" class="btn btn-secondary ms-2">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
